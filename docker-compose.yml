services:
  # redis:
  #   image: redis:7-alpine
  #   container_name: redis
  #   networks:
  #     - application
  #   restart: unless-stopped
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - rails-mysql-data:/var/lib/mysql
    networks:
      - application
      - storage
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 30s
  rails-app:
    build: .
    image: rails-rails-web-app
    depends_on:
      mysql-db:
        condition: service_healthy
    volumes:
      - type: volume
        source: shared_data
        target: /app/storage
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOST: mysql-db
      # REDIS_URL: ${REDIS_URL}
    command: bash -c "bundle exec rails server -b 0.0.0.0"
    networks:
      - application
      - storage
      - monitoring 
  migrator:
    build: .
    image: rails-rails-migrator
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOST: mysql-db
      # REDIS_URL: ${REDIS_URL}
      SECRET_KEY_BASE: ${SECRET_KEY}
    command: bash -c "bundle exec rails db:prepare"
    networks:
      - application
  nginx:
    image: nginx:latest
    container_name: rails-nginx
    ports:
      - "80:80"
    depends_on:
      - rails-app
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      - public
      - application
      - monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - monitoring
      - application
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    networks:
      - monitoring
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
  nfs-server:
    image: itsthenetwork/nfs-server-alpine:latest
    container_name: nfs-server
    privileged: true
    restart: unless-stopped
    environment:
      SHARED_DIRECTORY: /exports
    volumes:
      - shared_data:/exports
    networks:
      - storage
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command:
      - --nginx.scrape-uri=http://rails-nginx/nginx_status
    depends_on:
      - nginx
    networks:
      - monitoring
      - application
  backup:
    build: ./backup
    container_name: backup
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOST: mysql-db
      SECRET_KEY_BASE: ${SECRET_KEY}
    networks:
      - application
      - storage
    volumes:
      - shared_data:/backup
      - backup_data:/backup_data
    depends_on:
      - mysql-db
    restart: unless-stopped
  
  
volumes:
  rails-mysql-data:
  # app-storage:
  grafana_data:
  shared_data:
    driver: local
    # driver_opts:
    #   type: nfs
    #   o: addr=nfs-server,rw,nolock,soft
    #   device: ":/exports"
  backup_data:
  
networks:
  public:
  application:
  storage:
    # driver: bridge
    # ipam:
    #   config:
    #     - subnet: 172.28.0.0/16
  monitoring: